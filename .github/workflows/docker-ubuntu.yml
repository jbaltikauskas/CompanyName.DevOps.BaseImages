name: Docker-Ubuntu 

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io

  # Image path: ghcr.io/<repository_owner>/<IMAGE_NAME> (not the Git repo name)
  IMAGE_NAME: ubuntu-net-10

  DOCKERFILE: ./dockerfiles/ubuntu/10/dockerfile
  
  DOCKER_BUILD_CONTEXT: ./dockerfiles/ubuntu/10

  # Base image for the Ubuntu .NET Dockerfile (overrides Dockerfile ARG default when building in CI).
  SOURCE_IMAGE: mcr.microsoft.com/dotnet/aspnet:10.0-noble

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # UTC tag …:yyyyMMdd-HHmm (docker pull uses :tag, not @tag)
      - name: Set image datetime tag
        id: image-datetime
        run: echo "tag=$(date -u +'%Y%m%d-%H%M')" >> "$GITHUB_OUTPUT"

      # ghcr.io/<owner>/<IMAGE_NAME> — owner and path must be lowercase for GHCR
      - name: Image name for GHCR (lowercase)
        id: image
        run: |
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "name=${owner}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      # Install the cosign tool except on PR
      # https://github.com/sigstore/cosign-installer
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.1
   
      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ steps.image-datetime.outputs.tag }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.description=CompanyName base image for .NET builds
          annotations: |
            org.opencontainers.image.description=CompanyName base image for .NET builds

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.DOCKER_BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          build-args: |
            SOURCE_IMAGE=${{ env.SOURCE_IMAGE }}
          push: ${{ github.event_name != 'pull_request' }}
          # Explicit tags only — do not use meta.outputs.tags (can include digest-style tags)
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.image-datetime.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
          labels: |
            ${{ steps.meta.outputs.labels }}
          annotations: |
            ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Sign the resulting Docker image digest except on PRs.
      # This will only write to the public Rekor transparency log when the Docker
      # repository is public to avoid leaking data.  If you would like to publish
      # transparency data even for private images, pass --force to cosign below.
      # https://github.com/sigstore/cosign
      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        # This step uses the identity token to provision an ephemeral certificate
        # against the sigstore community Fulcio instance.
        run: |
          printf '%s\n' \
            "${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.image-datetime.outputs.tag }}" \
            "${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest" \
            | xargs -I {} cosign sign --yes {}@"${DIGEST}"
